name: KeyAtlas
options:
  bundleIdPrefix: com.kennnyshiwa
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  SWIFT_VERSION: "6.0"
  GENERATE_INFOPLIST_FILE: true
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: 3
packages:
  Nuke:
    url: https://github.com/kean/Nuke.git
    from: "12.0.0"
targets:
  KeyAtlas:
    type: application
    platform: iOS
    sources:
      - path: Sources/KeyAtlas
    resources:
      - path: Sources/KeyAtlas/Resources/Colors.xcassets
      - path: Sources/KeyAtlas/Resources/Assets.xcassets
    dependencies:
      - package: Nuke
        product: Nuke
      - package: Nuke
        product: NukeUI
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.kennnyshiwa.KeyAtlas
        DEVELOPMENT_TEAM: T7DZYJXJFV
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: KeyAtlas.entitlements
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
